<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 | 포도농장</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body data-page="admin-login">

  <div class="admin-login">
    <div class="admin-login__card">
      <div style="text-align:center;font-size:40px;margin-bottom:16px">🍇</div>
      <h1 class="admin-login__title">관리자 로그인</h1>
      <p class="admin-login__subtitle">포도농장 주문 관리 시스템</p>

      <form id="admin-login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" class="form-input" placeholder="admin@grape.example.com" value="admin@grape.example.com" required />
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label">비밀번호</label>
          <input type="password" class="form-input" placeholder="비밀번호" value="password" required />
        </div>
        <button type="submit" class="btn btn--primary btn--full btn--lg">로그인</button>
      </form>

      <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--color-text-muted)">
        bkend.ai 인증 연동 (Phase 4 구현 예정)
      </p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      window.location.href = 'admin-orders.html';
    }
  </script>
</body>
</html>
